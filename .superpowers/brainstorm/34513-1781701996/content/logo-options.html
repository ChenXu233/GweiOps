<h2>裂金环 Logo 设计方案</h2>
<p class="subtitle">选择你喜欢的光楔形状</p>

<div class="cards">
  <div class="card" data-choice="triangle" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D4A843"/>
            <stop offset="50%" stop-color="#F0D078"/>
            <stop offset="100%" stop-color="#B8922A"/>
          </linearGradient>
          <linearGradient id="dark1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1a1a1a"/>
            <stop offset="100%" stop-color="#2d2d2d"/>
          </linearGradient>
          <filter id="shadow1" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000040"/>
          </filter>
        </defs>
        <!-- 黑色圆环主体（带缺口） -->
        <circle cx="140" cy="140" r="90" fill="none" stroke="url(#dark1)" stroke-width="28"
                stroke-dasharray="480 84" stroke-dashoffset="-60" stroke-linecap="butt"
                filter="url(#shadow1)"/>
        <!-- 金色光楔 - 锐利三角 -->
        <polygon points="195,68 220,95 170,95" fill="url(#gold1)" filter="url(#shadow1)"/>
        <!-- 金色光楔的高光边 -->
        <line x1="195" y1="68" x2="220" y2="95" stroke="#F5E6A3" stroke-width="1.5" opacity="0.8"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 A：锐利三角</h3>
      <p>尖锐的三角形指向圆心，有冲击力和科技感。三角形的尖端暗示"精准介入"。</p>
    </div>
  </div>

  <div class="card" data-choice="arrow" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D4A843"/>
            <stop offset="50%" stop-color="#F0D078"/>
            <stop offset="100%" stop-color="#B8922A"/>
          </linearGradient>
          <linearGradient id="dark2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1a1a1a"/>
            <stop offset="100%" stop-color="#2d2d2d"/>
          </linearGradient>
          <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000040"/>
          </filter>
        </defs>
        <!-- 黑色圆环主体（带缺口） -->
        <circle cx="140" cy="140" r="90" fill="none" stroke="url(#dark2)" stroke-width="28"
                stroke-dasharray="480 84" stroke-dashoffset="-60" stroke-linecap="butt"
                filter="url(#shadow2)"/>
        <!-- 金色光楔 - 指针/箭头 -->
        <polygon points="195,60 225,100 195,85 165,100" fill="url(#gold2)" filter="url(#shadow2)"/>
        <!-- 金色光楔的高光边 -->
        <line x1="195" y1="60" x2="225" y2="100" stroke="#F5E6A3" stroke-width="1.5" opacity="0.8"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 B：指针箭头</h3>
      <p>像指针或箭头，指向明确，有方向感。暗示"AI 的精准分析"和"指向解决方案"。</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 8px;">
  <h3>设计说明</h3>
  <ul>
    <li><strong>黑色圆环</strong>：代表"未济"——日常的 Issue 流转、维护循环</li>
    <li><strong>金色光楔</strong>：代表"既济"——Gwei AI 的洞察、分析、修复</li>
    <li><strong>两者拼接</strong>：代表人机交汇的瞬间——AI 完成分析，等你拍板</li>
  </ul>
  <p style="margin-top: 10px; opacity: 0.7;">两种方案都保持了"立体圆环"的厚度感，黑色部分有微妙的渐变，金色部分有高光边。</p>
</div>
