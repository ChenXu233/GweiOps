<h2>裂金环 Logo</h2>
<p class="subtitle">尖端圆心 → 尾巴指向缺口 → 尾巴半透明</p>

<div class="cards">
  <div class="card" data-choice="triangle" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g1" gradientUnits="userSpaceOnUse" x1="160" y1="160" x2="190" y2="78">
            <stop offset="0%" stop-color="#a89f82" stop-opacity="1"/>
            <stop offset="100%" stop-color="#a89f82" stop-opacity="0.2"/>
          </linearGradient>
        </defs>
        <!-- 黑色圆环，缺口在右上 -->
        <path d="M 230 117 A 90 90 0 1 1 217 90" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <!-- 锐利三角：尖端在圆心(160,160)，尾巴覆盖缺口 -->
        <polygon points="160,160 250,60 110,60" fill="url(#g1)"/>
      </svg>
    </div>
    <div class="card-body"><h3>方案 A：锐利三角</h3><p>尖端圆心实色，尾巴半透明</p></div>
  </div>

  <div class="card" data-choice="arrow" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g2" gradientUnits="userSpaceOnUse" x1="160" y1="160" x2="190" y2="78">
            <stop offset="0%" stop-color="#a89f82" stop-opacity="1"/>
            <stop offset="100%" stop-color="#a89f82" stop-opacity="0.2"/>
          </linearGradient>
        </defs>
        <path d="M 230 117 A 90 90 0 1 1 217 90" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <polygon points="160,160 255,55 160,88 65,55" fill="url(#g2)"/>
      </svg>
    </div>
    <div class="card-body"><h3>方案 B：指针箭头</h3><p>箭头尖端圆心，尾巴半透明</p></div>
  </div>
</div>
