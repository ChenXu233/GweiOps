<h2>裂金环 Logo 设计方案</h2>
<p class="subtitle">选择你喜欢的光楔形状</p>

<div class="cards">
  <div class="card" data-choice="triangle" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <!-- 黑色圆环主体（带缺口的弧线） -->
        <path d="M 232.7 119.6 A 90 90 0 1 1 219.6 92.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <!-- 金色光楔 - 锐利三角，尖端从圆心开始，尾巴半透明 -->
        <defs>
          <linearGradient id="fade1" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#b0a890" stop-opacity="0"/>
            <stop offset="40%" stop-color="#b0a890" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#b0a890" stop-opacity="1"/>
          </linearGradient>
        </defs>
        <polygon points="160,160 230,80 150,80" fill="url(#fade1)"/>
        <!-- 高光边 -->
        <line x1="160" y1="160" x2="230" y2="80" stroke="#c0b898" stroke-width="1.5" opacity="0.6"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 A：锐利三角</h3>
      <p>尖端从圆心开始，向外放射，覆盖缺口。尾巴半透明，暗示"洞察从中心扩散"。</p>
    </div>
  </div>

  <div class="card" data-choice="arrow" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <!-- 黑色圆环主体（带缺口的弧线） -->
        <path d="M 232.7 119.6 A 90 90 0 1 1 219.6 92.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <!-- 金色光楔 - 指针箭头，尖端从圆心开始，尾巴半透明 -->
        <defs>
          <linearGradient id="fade2" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#b0a890" stop-opacity="0"/>
            <stop offset="40%" stop-color="#b0a890" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#b0a890" stop-opacity="1"/>
          </linearGradient>
        </defs>
        <polygon points="160,160 240,80 160,100 80,80" fill="url(#fade2)"/>
        <!-- 高光边 -->
        <line x1="160" y1="160" x2="240" y2="80" stroke="#c0b898" stroke-width="1.5" opacity="0.6"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 B：指针箭头</h3>
      <p>箭头从圆心射出，覆盖缺口方向。尾巴半透明，暗示"AI 分析精准指向"。</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 8px;">
  <h3>设计说明</h3>
  <ul>
    <li><strong>黑色圆环</strong>：代表"未济"——日常的 Issue 流转、维护循环</li>
    <li><strong>淡灰金色光楔</strong>：代表"既济"——Gwei AI 的洞察、分析、修复</li>
    <li><strong>两者拼接</strong>：代表人机交汇的瞬间——AI 完成分析，等你拍板</li>
  </ul>
  <p style="margin-top: 10px; opacity: 0.7;">光楔从圆心尖端开始，向外扩散覆盖缺口，尾巴半透明渐隐。</p>
</div>
