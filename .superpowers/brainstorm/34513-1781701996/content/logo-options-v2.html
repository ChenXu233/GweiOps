<h2>裂金环 Logo 设计方案</h2>
<p class="subtitle">选择你喜欢的光楔形状</p>

<div class="cards">
  <div class="card" data-choice="triangle" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
        <!-- 黑色圆环主体（带缺口的弧线） -->
        <path d="M 212.7 99.6 A 90 90 0 1 1 199.6 72.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <!-- 金色光楔 - 锐利三角 -->
        <polygon points="207,85 195,65 183,85" fill="#D4A843"/>
        <!-- 金色高光边 -->
        <line x1="207" y1="85" x2="195" y2="65" stroke="#F0D078" stroke-width="2"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 A：锐利三角</h3>
      <p>尖锐的三角形指向圆心，有冲击力和科技感。三角形的尖端暗示"精准介入"。</p>
    </div>
  </div>

  <div class="card" data-choice="arrow" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
        <!-- 黑色圆环主体（带缺口的弧线） -->
        <path d="M 212.7 99.6 A 90 90 0 1 1 199.6 72.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <!-- 金色光楔 - 指针箭头 -->
        <polygon points="207,85 195,60 183,85 195,75" fill="#D4A843"/>
        <!-- 金色高光边 -->
        <line x1="207" y1="85" x2="195" y2="60" stroke="#F0D078" stroke-width="2"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 B：指针箭头</h3>
      <p>像指针或箭头，指向明确，有方向感。暗示"AI 的精准分析"和"指向解决方案"。</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 8px;">
  <h3>设计说明</h3>
  <ul>
    <li><strong>黑色圆环</strong>：代表"未济"——日常的 Issue 流转、维护循环</li>
    <li><strong>金色光楔</strong>：代表"既济"——Gwei AI 的洞察、分析、修复</li>
    <li><strong>两者拼接</strong>：代表人机交汇的瞬间——AI 完成分析，等你拍板</li>
  </ul>
  <p style="margin-top: 10px; opacity: 0.7;">纯色设计，无渐变。圆环是完整的环形，右上角有干净的缺口，金色光楔嵌入其中。</p>
</div>
