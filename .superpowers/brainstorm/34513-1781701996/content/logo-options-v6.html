<h2>裂金环 Logo</h2>
<p class="subtitle">尖端在圆心 → 尾巴覆盖缺口 → 尾巴半透明</p>

<div class="cards">
  <div class="card" data-choice="triangle" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- 从圆心（尖端）向外（尾巴）渐变：实色→半透明 -->
          <radialGradient id="fade1" cx="0.5" cy="0.5" r="0.5" fx="0.35" fy="0.35">
            <stop offset="0%" stop-color="#b0a890" stop-opacity="1"/>
            <stop offset="100%" stop-color="#b0a890" stop-opacity="0.15"/>
          </radialGradient>
        </defs>
        <!-- 黑色圆环（缺口在右上） -->
        <path d="M 232.7 119.6 A 90 90 0 1 1 219.6 92.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <!-- 光楔：尖端(160,160)在圆心，尾巴向外覆盖缺口 -->
        <polygon points="160,160 245,70 135,70" fill="url(#fade1)"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 A：锐利三角</h3>
    </div>
  </div>

  <div class="card" data-choice="arrow" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="fade2" cx="0.5" cy="0.5" r="0.5" fx="0.35" fy="0.35">
            <stop offset="0%" stop-color="#b0a890" stop-opacity="1"/>
            <stop offset="100%" stop-color="#b0a890" stop-opacity="0.15"/>
          </radialGradient>
        </defs>
        <!-- 黑色圆环（缺口在右上） -->
        <path d="M 232.7 119.6 A 90 90 0 1 1 219.6 92.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <!-- 光楔：尖端在圆心，箭头尾巴覆盖缺口 -->
        <polygon points="160,160 255,70 160,95 65,70" fill="url(#fade2)"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 B：指针箭头</h3>
    </div>
  </div>
</div>
