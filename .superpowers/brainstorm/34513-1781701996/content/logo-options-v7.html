<h2>裂金环 Logo</h2>
<p class="subtitle">尖端圆心实色 → 尾巴覆盖缺口半透明</p>

<div class="cards">
  <div class="card" data-choice="triangle" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- 沿三角轴向：尖端(圆心)→尾巴(缺口方向) -->
          <linearGradient id="g1" x1="160" y1="160" x2="200" y2="75" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#b0a890" stop-opacity="1"/>
            <stop offset="100%" stop-color="#b0a890" stop-opacity="0.2"/>
          </linearGradient>
        </defs>
        <path d="M 232.7 119.6 A 90 90 0 1 1 219.6 92.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <polygon points="160,160 250,65 110,65" fill="url(#g1)"/>
      </svg>
    </div>
    <div class="card-body"><h3>方案 A：锐利三角</h3></div>
  </div>

  <div class="card" data-choice="arrow" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g2" x1="160" y1="160" x2="200" y2="75" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#b0a890" stop-opacity="1"/>
            <stop offset="100%" stop-color="#b0a890" stop-opacity="0.2"/>
          </linearGradient>
        </defs>
        <path d="M 232.7 119.6 A 90 90 0 1 1 219.6 92.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <polygon points="160,160 260,65 160,90 60,65" fill="url(#g2)"/>
      </svg>
    </div>
    <div class="card-body"><h3>方案 B：指针箭头</h3></div>
  </div>
</div>
