<h2>裂金环 Logo 设计方案</h2>
<p class="subtitle">选择你喜欢的光楔形状</p>

<div class="cards">
  <div class="card" data-choice="triangle" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <!-- 黑色圆环主体（带缺口的弧线） -->
        <path d="M 232.7 119.6 A 90 90 0 1 1 219.6 92.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <!-- 金色光楔 - 锐利三角，从圆心放射 -->
        <polygon points="160,160 210,70 130,70" fill="#c8b888"/>
        <!-- 高光边 -->
        <line x1="160" y1="160" x2="210" y2="70" stroke="#d8c898" stroke-width="2"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 A：锐利三角</h3>
      <p>从圆心放射出的三角形，尖端指向缺口。暗示"AI 的洞察从中心向外辐射"。</p>
    </div>
  </div>

  <div class="card" data-choice="arrow" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <!-- 黑色圆环主体（带缺口的弧线） -->
        <path d="M 232.7 119.6 A 90 90 0 1 1 219.6 92.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <!-- 金色光楔 - 指针箭头，从圆心放射 -->
        <polygon points="160,160 220,70 160,95 100,70" fill="#c8b888"/>
        <!-- 高光边 -->
        <line x1="160" y1="160" x2="220" y2="70" stroke="#d8c898" stroke-width="2"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 B：指针箭头</h3>
      <p>从圆心放射出的箭头，指向缺口方向。暗示"AI 的精准分析指向解决方案"。</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 8px;">
  <h3>设计说明</h3>
  <ul>
    <li><strong>黑色圆环</strong>：代表"未济"——日常的 Issue 流转、维护循环</li>
    <li><strong>淡灰金色光楔</strong>：代表"既济"——Gwei AI 的洞察、分析、修复</li>
    <li><strong>两者拼接</strong>：代表人机交汇的瞬间——AI 完成分析，等你拍板</li>
  </ul>
  <p style="margin-top: 10px; opacity: 0.7;">纯色设计，无渐变。光楔从圆心放射，颜色为淡灰偏金色。</p>
</div>
