<h2>裂金环 Logo</h2>
<p class="subtitle">锐利三角 · 尖端在圆心 · 尾巴覆盖右上缺口 · 尾巴半透明</p>

<div style="display:flex;justify-content:center;padding:30px 0;background:rgba(255,255,255,0.03);border-radius:8px">
  <svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- 渐变：尖端(圆心)实色 → 尾巴(缺口方向)半透明 -->
      <linearGradient id="wedge" gradientUnits="userSpaceOnUse" x1="200" y1="200" x2="240" y2="100">
        <stop offset="0%" stop-color="#a89f82" stop-opacity="1"/>
        <stop offset="100%" stop-color="#a89f82" stop-opacity="0.2"/>
      </linearGradient>
    </defs>
    <!-- 黑色圆环：完整环形，右上角有干净缺口 -->
    <path d="
      M 290 140
      A 100 100 0 1 1 275 110
    " fill="none" stroke="#1a1a1a" stroke-width="32" stroke-linecap="butt"/>
    <!-- 锐利三角光楔：尖端在圆心(200,200)，尾巴覆盖缺口 -->
    <polygon points="200,200 310,70 200,80" fill="url(#wedge)"/>
  </svg>
</div>

<div class="section" style="margin-top:20px;padding:20px;background:rgba(255,255,255,0.05);border-radius:8px">
  <h3>设计要素</h3>
  <ul>
    <li>圆环：<code>#1a1a1a</code> 纯黑，线宽 32，右上缺口</li>
    <li>光楔：<code>#a89f82</code> 淡灰偏金，锐利三角</li>
    <li>尖端：实色，位于圆心</li>
    <li>尾巴：半透明 (0.2)，覆盖缺口方向</li>
  </ul>
</div>
