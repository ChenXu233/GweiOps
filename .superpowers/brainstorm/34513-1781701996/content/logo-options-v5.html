<h2>裂金环 Logo 设计方案</h2>
<p class="subtitle">选择你喜欢的光楔形状</p>

<div class="cards">
  <div class="card" data-choice="triangle" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- 尖端实色，尾巴半透明 -->
          <linearGradient id="fade1" x1="0.5" y1="0.5" x2="1" y2="0">
            <stop offset="0%" stop-color="#b0a890" stop-opacity="1"/>
            <stop offset="60%" stop-color="#b0a890" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#b0a890" stop-opacity="0.15"/>
          </linearGradient>
        </defs>
        <!-- 黑色圆环主体（带缺口的弧线） -->
        <path d="M 232.7 119.6 A 90 90 0 1 1 219.6 92.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <!-- 光楔：尖端在圆心，尾巴覆盖缺口，尾巴半透明 -->
        <polygon points="160,160 240,75 140,75" fill="url(#fade1)"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 A：锐利三角</h3>
      <p>尖端在圆心，尾巴覆盖缺口，尾巴半透明渐隐。</p>
    </div>
  </div>

  <div class="card" data-choice="arrow" onclick="toggleSelect(this)">
    <div class="card-image">
      <svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- 尖端实色，尾巴半透明 -->
          <linearGradient id="fade2" x1="0.5" y1="0.5" x2="1" y2="0">
            <stop offset="0%" stop-color="#b0a890" stop-opacity="1"/>
            <stop offset="60%" stop-color="#b0a890" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#b0a890" stop-opacity="0.15"/>
          </linearGradient>
        </defs>
        <!-- 黑色圆环主体（带缺口的弧线） -->
        <path d="M 232.7 119.6 A 90 90 0 1 1 219.6 92.7" fill="none" stroke="#1a1a1a" stroke-width="28" stroke-linecap="butt"/>
        <!-- 光楔：尖端在圆心，尾巴覆盖缺口，尾巴半透明 -->
        <polygon points="160,160 250,75 160,95 70,75" fill="url(#fade2)"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>方案 B：指针箭头</h3>
      <p>箭头尖端在圆心，尾巴覆盖缺口，尾巴半透明渐隐。</p>
    </div>
  </div>
</div>
