services:
  engine:
    build: ./engine
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://gwei:gwei@postgres:5432/gwei
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gwei
      POSTGRES_PASSWORD: gwei
      POSTGRES_DB: gwei
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
