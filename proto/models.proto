syntax = "proto3";

package gweiops.models;

message Issue {
    string id = 1;
    string title = 2;
    string body = 3;
    repeated string labels = 4;
    string status = 5;
    string source = 6;
    int64 created_at = 7;
}

message PullRequest {
    string id = 1;
    string issue_id = 2;
    string title = 3;
    string body = 4;
    string diff = 5;
    string status = 6;
    int64 created_at = 7;
}

message Diagnosis {
    string issue_type = 1;
    string root_cause = 2;
    string action_type = 3;
    string severity = 4;
}

message Patch {
    string type = 1;
    string diff = 2;
    string risk = 3;
    string description = 4;
}
