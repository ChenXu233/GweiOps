name: Build and Push Image

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push engine image
        uses: docker/build-push-action@v5
        with:
          context: ./engine
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ steps.version.outputs.tag && format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME, steps.version.outputs.tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ github.sha }}
            ${{ steps.version.outputs.tag && format('{0}/{1}-web:{2}', env.REGISTRY, env.IMAGE_NAME, steps.version.outputs.tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clean old hash tags (engine)
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          VERSIONS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/user/packages/container/${PACKAGE_NAME##*/}/versions" \
            --paginate \
            --jq '.[] | select(.metadata.container.tags | length > 0) | {id: .id, tags: .metadata.container.tags}')
          CURRENT_HASH="${{ github.sha }}"
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          echo "$VERSIONS" | jq -c '.' | while read -r version; do
            VERSION_ID=$(echo "$version" | jq -r '.id')
            TAGS=$(echo "$version" | jq -r '.tags[]')
            SHOULD_KEEP=false
            for tag in $TAGS; do
              if [[ "$tag" == "latest" || "$tag" == "$CURRENT_HASH" || "$tag" == "$CURRENT_TAG" ]]; then
                SHOULD_KEEP=true
                break
              fi
            done
            if [[ "$SHOULD_KEEP" == "false" ]]; then
              echo "Deleting engine version $VERSION_ID (tags: $TAGS)"
              gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/user/packages/container/${PACKAGE_NAME##*/}/versions/$VERSION_ID" || true
            fi
          done

      - name: Clean old hash tags (web)
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          VERSIONS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/user/packages/container/${PACKAGE_NAME##*/}-web/versions" \
            --paginate \
            --jq '.[] | select(.metadata.container.tags | length > 0) | {id: .id, tags: .metadata.container.tags}')
          CURRENT_HASH="${{ github.sha }}"
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          echo "$VERSIONS" | jq -c '.' | while read -r version; do
            VERSION_ID=$(echo "$version" | jq -r '.id')
            TAGS=$(echo "$version" | jq -r '.tags[]')
            SHOULD_KEEP=false
            for tag in $TAGS; do
              if [[ "$tag" == "latest" || "$tag" == "$CURRENT_HASH" || "$tag" == "$CURRENT_TAG" ]]; then
                SHOULD_KEEP=true
                break
              fi
            done
            if [[ "$SHOULD_KEEP" == "false" ]]; then
              echo "Deleting web version $VERSION_ID (tags: $TAGS)"
              gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/user/packages/container/${PACKAGE_NAME##*/}-web/versions/$VERSION_ID" || true
            fi
          done

      - name: Image info
        run: |
          echo "🎉 Images built and pushed successfully!"
          echo "Engine: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Web: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web"
          echo "Tags: latest, ${{ github.sha }}"
          if [ "${{ steps.version.outputs.is_release }}" = "true" ]; then
            echo "Version: ${{ steps.version.outputs.tag }}"
          fi
