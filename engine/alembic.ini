# Gwei Engine -- Alembic database migration config
#
# Usage (run from engine/ directory):
#   alembic revision --autogenerate -m "description"
#   alembic upgrade head
#
# Note: database URL is read from Settings by env.py, not from this file.

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = ..
sqlalchemy.url = driver://user:pass@localhost/dbname

# file_template = %%(rev)s_%%(slug)s
# timezone =
# truncate_slug_length = 40
# revision_environment = false
# sourceless = false
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions
# path_separator = os
# recursive_version_locations = false
# output_encoding = utf-8

[post_write_hooks]
# log_file = ../alembic.log

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S