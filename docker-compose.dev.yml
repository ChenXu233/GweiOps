# 开发环境配置
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: gwei-engine-dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://gwei:gwei@postgres:5432/gwei
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=true
    env_file:
      - .env
    volumes:
      - ./engine:/app
    command: >
      uvicorn engine.api.app:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: gwei-postgres-dev
    environment:
      POSTGRES_USER: gwei
      POSTGRES_PASSWORD: gwei
      POSTGRES_DB: gwei
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gwei -d gwei"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gwei-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  redis_dev_data:
