version: '3.8'

services:
  engine:
    image: ghcr.io/chenxu233/gweiops:latest
    container_name: gwei-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://gwei:gwei@postgres:5432/gwei
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - gwei-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: gwei-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=gwei
      - POSTGRES_USER=gwei
      - POSTGRES_PASSWORD=gwei
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gwei"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gwei-network

  redis:
    image: redis:7-alpine
    container_name: gwei-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gwei-network

volumes:
  postgres-data:
  redis-data:

networks:
  gwei-network:
    driver: bridge
